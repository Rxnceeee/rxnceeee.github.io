<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>How are you feeling? 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#0f0e17;
      --surface:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.1);
      --text:#f5f0ff;
      --sub:rgba(245,240,255,0.5);
      --accent:#c9a96e;
      --pill-scale:1;
    }

    html{scroll-behavior:smooth}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans',sans-serif;
      font-weight:300;
      min-height:100vh;
      overflow-x:hidden;
      transition:background 0.7s cubic-bezier(.4,0,.2,1);
    }

    /* ── PARTICLES ── */
    #bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}

    /* ── LAYOUT ── */
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 1.2rem 4rem}

    /* ── HEADER ── */
    .header{text-align:center;padding:3.5rem 1rem 2.5rem;max-width:520px}
    .header-eyebrow{
      font-size:.68rem;letter-spacing:.35em;text-transform:uppercase;
      color:var(--accent);margin-bottom:1rem;
      opacity:0;animation:up .7s .1s forwards
    }
    .header-title{
      font-family:'Playfair Display',serif;
      font-size:clamp(2.2rem,7vw,4rem);
      font-weight:400;line-height:1.1;
      color:var(--text);
      opacity:0;animation:up .8s .25s forwards
    }
    .header-title em{font-style:italic;color:var(--accent)}
    .header-sub{
      font-size:.95rem;color:var(--sub);
      margin-top:.9rem;line-height:1.6;
      opacity:0;animation:up .8s .4s forwards
    }

    /* ── MOOD PILLS ── */
    .mood-grid{
      display:flex;flex-wrap:wrap;justify-content:center;
      gap:.8rem;max-width:600px;width:100%;
      margin-bottom:3rem;
      opacity:0;animation:up .8s .55s forwards
    }
    .mood-pill{
      display:flex;align-items:center;gap:.6rem;
      padding:.75rem 1.4rem;
      border-radius:999px;
      border:1.5px solid var(--border);
      background:var(--surface);
      cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:.9rem;font-weight:400;
      color:var(--text);
      transition:all .25s cubic-bezier(.34,1.56,.64,1);
      backdrop-filter:blur(8px);
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .mood-pill:hover{transform:translateY(-3px) scale(1.04)}
    .mood-pill.active{color:#0f0e17;font-weight:500;border-color:transparent}
    .mood-pill .pill-emoji{font-size:1.2rem;line-height:1}

    /* individual pill colors */
    .pill-happy  {--c:#f9d56e;--cs:#f5a623}
    .pill-kilig  {--c:#f9a8d4;--cs:#ec4899}
    .pill-sad    {--c:#93c5fd;--cs:#3b82f6}
    .pill-bored  {--c:#c4b5fd;--cs:#8b5cf6}
    .pill-stressed{--c:#86efac;--cs:#22c55e}
    .pill-miss   {--c:#fda4af;--cs:#f43f5e}

    .mood-pill:hover{border-color:var(--c,var(--accent));box-shadow:0 0 20px rgba(255,255,255,.06)}
    .mood-pill.active{background:linear-gradient(135deg,var(--c),var(--cs));box-shadow:0 6px 24px rgba(0,0,0,.3)}

    /* ── CONTENT CARD ── */
    .content-card{
      width:100%;max-width:560px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      border-radius:24px;
      padding:2.2rem 2rem;
      backdrop-filter:blur(12px);
      display:none;
      opacity:0;
      transform:translateY(20px);
      transition:opacity .5s ease,transform .5s ease;
    }
    .content-card.visible{display:block}
    .content-card.shown{opacity:1;transform:translateY(0)}

    /* letter section */
    .letter-label{
      font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;
      color:var(--accent);margin-bottom:1.2rem;display:flex;
      align-items:center;gap:.6rem
    }
    .letter-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .letter-text{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.05rem,2.5vw,1.25rem);
      line-height:1.85;color:var(--text);
      min-height:120px;
    }
    .cursor{
      display:inline-block;width:2px;height:1.1em;
      background:var(--accent);margin-left:2px;vertical-align:text-bottom;
      animation:blink .8s step-end infinite
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* compliment */
    .compliment-wrap{
      margin-top:1.6rem;padding:1rem 1.2rem;
      background:rgba(255,255,255,0.04);
      border-left:2px solid var(--accent);
      border-radius:0 10px 10px 0;
      font-style:italic;font-size:.92rem;
      color:rgba(245,240,255,.75);line-height:1.6;
      cursor:pointer;transition:background .2s;
      position:relative;
    }
    .compliment-wrap:hover{background:rgba(255,255,255,.07)}
    .compliment-hint{
      font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--accent);margin-top:.5rem;display:block;font-style:normal
    }

    /* playlist */
    .playlist-label{
      font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;
      color:var(--accent);margin:1.8rem 0 1rem;
      display:flex;align-items:center;gap:.6rem
    }
    .playlist-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .song-list{display:flex;flex-direction:column;gap:.6rem}
    .song-card{
      display:flex;align-items:center;gap:.9rem;
      padding:.7rem .9rem;
      background:rgba(255,255,255,.04);
      border-radius:12px;border:1px solid rgba(255,255,255,.07);
      transition:all .2s;cursor:default;
    }
    .song-card:hover{background:rgba(255,255,255,.08);transform:translateX(3px)}
    .song-num{
      font-size:.7rem;color:var(--sub);
      width:16px;text-align:center;flex-shrink:0
    }
    .song-bars{
      display:flex;align-items:flex-end;gap:2px;
      width:16px;height:16px;flex-shrink:0;
    }
    .song-bar{width:3px;background:var(--accent);border-radius:2px;animation:equalizer var(--d,.4s) ease-in-out infinite alternate}
    .song-bar:nth-child(1){height:6px;--d:.3s}
    .song-bar:nth-child(2){height:12px;--d:.5s}
    .song-bar:nth-child(3){height:8px;--d:.4s}
    @keyframes equalizer{from{transform:scaleY(.4)}to{transform:scaleY(1)}}
    .song-info{flex:1;min-width:0}
    .song-title{font-size:.9rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song-artist{font-size:.75rem;color:var(--sub);margin-top:.1rem}
    .song-vibe{font-size:.68rem;font-style:italic;color:var(--accent);margin-top:.15rem}

    /* mood tag */
    .mood-tag{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.3rem .8rem;border-radius:999px;
      font-size:.7rem;font-weight:500;letter-spacing:.05em;
      margin-bottom:1.4rem;
    }

    /* reset button */
    .reset-btn{
      display:block;margin:2rem auto 0;
      background:none;border:1px solid var(--border);
      color:var(--sub);border-radius:999px;
      padding:.5rem 1.2rem;font-size:.75rem;
      letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .reset-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* ── ANIMATIONS ── */
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    /* ── FLOATING HEARTS ── */
    .floater{
      position:fixed;pointer-events:none;z-index:50;
      font-size:1.3rem;animation:float-up 1.2s ease-out forwards
    }
    @keyframes float-up{
      0%{opacity:1;transform:translateY(0) scale(1)}
      100%{opacity:0;transform:translateY(-80px) scale(.6)}
    }

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .content-card{padding:1.6rem 1.3rem;border-radius:18px}
      .header{padding:2.5rem .8rem 1.8rem}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition:none!important}
      .content-card{opacity:1;transform:none}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

    <h1 class="header-title">How are you<br><em>feeling today?</em></h1>

  <!-- MOOD PILLS -->

  </div>

  <div class="content-card" id="contentCard">

    <div class="letter-label">A message from me</div>
    <div class="letter-text" id="letterText"><span class="cursor"></span></div>
    <div class="compliment-wrap" id="complimentBox">

      <span class="compliment-hint">✨ tap for a new one</span>
    </div>
    <div class="playlist-label">Songs that match your vibe</div>
    <div class="song-list" id="songList"></div>
    <button class="reset-btn" onclick="reset()">← Pick another mood</button>

</div>

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentMood = null;
let typeTimer = null;
let complimentIndex = 0;

/* ═══════════════════════════════════════
   MOOD SELECT
═══════════════════════════════════════ */
document.querySelectorAll('.mood-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const mood = pill.dataset.mood;
    selectMood(mood, pill);
    spawnFloaters(pill);
  });
});

function selectMood(mood, pillEl) {
  if (currentMood === mood) return;
  currentMood = mood;
  const data = MOODS[mood];

  // update pills
  document.querySelectorAll('.mood-pill').forEach(p => p.classList.remove('active'));
  pillEl.classList.add('active');

  // morph bg
  document.body.style.background = data.bg;
  document.documentElement.style.setProperty('--accent', data.accent);
  document.documentElement.style.setProperty('--border', data.accent + '33');

  // update card
  const card = document.getElementById('contentCard');
  const tag = document.getElementById('moodTag');
  tag.textContent = data.emoji + ' ' + data.label;
  tag.style.background = data.tagBg;
  tag.style.color = data.tagColor;

  // songs
  renderSongs(data.songs, data.accent);

  // compliment
  complimentIndex = Math.floor(Math.random() * data.compliments.length);
  document.getElementById('complimentText').textContent = data.compliments[complimentIndex];

  // show card
  card.style.display = 'block';
  card.classList.remove('shown');
  void card.offsetWidth; // reflow
  card.classList.add('visible');
  setTimeout(() => card.classList.add('shown'), 20);

  // typewrite letter
  const letter = data.letters[Math.floor(Math.random() * data.letters.length)];
  typewrite(letter);

  // scroll to card
  setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
}

/* ═══════════════════════════════════════
   TYPEWRITER
═══════════════════════════════════════ */
function typewrite(text) {
  if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
  const el = document.getElementById('letterText');
  el.innerHTML = '<span class="cursor"></span>';
  let i = 0;
  const speed = 22;

  function tick() {
    if (i < text.length) {
      const char = text[i];
      // insert before cursor
      const cursor = el.querySelector('.cursor');
      const node = document.createTextNode(char === '\n' ? '\n' : char);
      if (char === '\n') {
        el.insertBefore(document.createElement('br'), cursor);
        el.insertBefore(document.createElement('br'), cursor);
      } else {
        el.insertBefore(node, cursor);
      }
      i++;
      // vary speed slightly
      const delay = char === ',' || char === '.' || char === '—' ? speed * 5 : char === '\n' ? speed * 8 : speed + Math.random() * 10;
      typeTimer = setTimeout(tick, delay);
    } else {
      el.querySelector('.cursor').style.display = 'none';
    }
  }
  tick();
}

/* ═══════════════════════════════════════
   SONGS
═══════════════════════════════════════ */
function renderSongs(songs, accent) {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  songs.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'song-card';
    div.style.animationDelay = (i * 0.08) + 's';
    div.innerHTML = `
      <span class="song-num">${i + 1}</span>
      <div class="song-bars">
        <div class="song-bar" style="background:${accent}"></div>
        <div class="song-bar" style="background:${accent}"></div>
        <div class="song-bar" style="background:${accent}"></div>
      </div>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
        <div class="song-vibe">${s.vibe}</div>
      </div>`;
    list.appendChild(div);
  });
}

/* ═══════════════════════════════════════
   COMPLIMENT ROTATION
═══════════════════════════════════════ */
document.getElementById('complimentBox').addEventListener('click', () => {
  if (!currentMood) return;
  const data = MOODS[currentMood];
  complimentIndex = (complimentIndex + 1) % data.compliments.length;
  const box = document.getElementById('complimentBox');
  box.style.opacity = '0';
  setTimeout(() => {
    document.getElementById('complimentText').textContent = data.compliments[complimentIndex];
    box.style.opacity = '1';
  }, 200);
  box.style.transition = 'opacity .2s';
});

/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
function reset() {
  if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
  currentMood = null;
  document.querySelectorAll('.mood-pill').forEach(p => p.classList.remove('active'));
  const card = document.getElementById('contentCard');
  card.classList.remove('shown');
  setTimeout(() => { card.classList.remove('visible'); card.style.display = 'none'; }, 500);
  document.body.style.background = '#0f0e17';
  document.documentElement.style.setProperty('--accent', '#c9a96e');
  document.documentElement.style.setProperty('--border', 'rgba(255,255,255,0.1)');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ═══════════════════════════════════════
   FLOATERS
═══════════════════════════════════════ */
function spawnFloaters(pill) {
  const rect = pill.getBoundingClientRect();
  const emojis = ['💛','🌸','✨','💫','🦋','💕'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
      el.style.top = (rect.top + window.scrollY) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }, i * 80);
  }
}

/* ═══════════════════════════════════════
   PARTICLE CANVAS
═══════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, dots = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  for (let i = 0; i < 55; i++) {
    dots.push({
      x: rand(0, 1), y: rand(0, 1),
      r: rand(1, 2.5),
      sx: rand(-.00015, .00015),
      sy: rand(-.00012, -.00005),
      alpha: rand(.15, .5),
      pulse: rand(0, Math.PI * 2),
      pulseSpeed: rand(.008, .02),
    });
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    for (const d of dots) {
      d.x += d.sx; d.y += d.sy; d.pulse += d.pulseSpeed;
      if (d.y < -0.02) d.y = 1.02;
      if (d.x < -0.02) d.x = 1.02;
      if (d.x > 1.02) d.x = -0.02;
      const a = d.alpha * (0.7 + 0.3 * Math.sin(d.pulse));
      ctx.beginPath();
      ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
